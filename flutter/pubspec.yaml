name: witness
description: Community safety reporting app for South Africa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Map
  flutter_map: ^6.1.0          # OpenStreetMap — completely free, no API key
  latlong2: ^0.9.0             # Lat/lng coordinate helpers

  # HTTP requests to backend
  http: ^1.2.0

  # Store JWT token locally
  shared_preferences: ^2.2.3

  # Location services
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
